<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --accent-secondary: #0F766E;
        --card-bg: rgba(18, 18, 18, 0.01);
        --border-color: #E6E4DF;
        --wave-inactive: #E6E4DF;
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --accent-secondary: #10B981;
          --card-bg: rgba(250, 249, 246, 0.02);
          --border-color: #222222;
          --wave-inactive: #222222;
        }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .card-rect { fill: var(--card-bg); stroke: var(--border-color); stroke-width: 1; transition: fill 0.4s ease, stroke 0.4s ease; }
      
      .text-title { font-family: var(--font-serif); font-size: 24px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-meta { font-family: var(--font-mono); font-size: 10px; fill: var(--accent-primary); letter-spacing: 0.15em; font-weight: 500; }
      .text-body { font-family: var(--font-sans); font-size: 13px; fill: var(--text-secondary); line-height: 1.5; transition: fill 0.4s ease; }
      
      .wave-bar { stroke-linecap: round; stroke-width: 3; }
      .disc-circle { fill: none; stroke: var(--border-color); stroke-width: 0.75; transition: stroke 0.4s ease; }
      .disc-gold { fill: none; stroke: var(--accent-primary); stroke-width: 1.25; }
    </style>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />
  <rect class="card-rect" x="10" y="10" width="580" height="300" rx="4" />

  <!-- Left: Editorial details -->
  <g transform="translate(40, 50)">
    <text class="text-meta">PROJECT 03 / DIGITAL SOUNDSCAPES</text>
    <text class="text-title" x="0" y="35">Music Artist Space</text>
    
    <text class="text-body" x="0" y="80">
      <tspan x="0" dy="0">An immersive digital interface tailored for</tspan>
      <tspan x="0" dy="20">auditory showcase. Implements custom</tspan>
      <tspan x="0" dy="20">media players, fluid soundscape controls,</tspan>
      <tspan x="0" dy="20">and micro-animations.</tspan>
    </text>

    <!-- Track metadata -->
    <g transform="translate(0, 180)">
      <text class="text-meta" x="0" y="0">CURRENT TRACK</text>
      <text font-family="var(--font-serif)" font-size="16px" fill="var(--text-primary)" x="0" y="22" transition="fill 0.4s ease">Acoustic Resonance.flac</text>
      <text class="text-meta" x="0" y="42" fill="var(--text-secondary)">BITRATE: 1411 KBPS • STEREO</text>
    </g>
  </g>

  <!-- Right: Waveform and Disc Graphic -->
  <g transform="translate(340, 80)">
    <!-- Rotating Audio Disc Geometric Lines -->
    <g transform="translate(180, 70)">
      <circle class="disc-circle" cx="0" cy="0" r="60" />
      <circle class="disc-circle" cx="0" cy="0" r="45" />
      <circle class="disc-gold" cx="0" cy="0" r="30" stroke-dasharray="8 4" />
      <circle cx="0" cy="0" r="6" fill="var(--accent-secondary)" />
    </g>

    <!-- Waveform Frequency Bars -->
    <g transform="translate(0, 140)">
      <!-- Series of bars representing frequencies -->
      <!-- We change colors asymmetrically to show progress -->
      <line class="wave-bar" x1="10" y1="0" x2="10" y2="-15" stroke="var(--accent-secondary)" />
      <line class="wave-bar" x1="20" y1="0" x2="20" y2="-32" stroke="var(--accent-secondary)" />
      <line class="wave-bar" x1="30" y1="0" x2="30" y2="-48" stroke="var(--accent-secondary)" />
      <line class="wave-bar" x1="40" y1="0" x2="40" y2="-20" stroke="var(--accent-primary)" />
      <line class="wave-bar" x1="50" y1="0" x2="50" y2="-55" stroke="var(--accent-primary)" />
      <line class="wave-bar" x1="60" y1="0" x2="60" y2="-75" stroke="var(--accent-primary)" />
      <line class="wave-bar" x1="70" y1="0" x2="70" y2="-40" stroke="var(--accent-primary)" />
      <line class="wave-bar" x1="80" y1="0" x2="80" y2="-62" stroke="var(--wave-inactive)" />
      <line class="wave-bar" x1="90" y1="0" x2="90" y2="-25" stroke="var(--wave-inactive)" />
      <line class="wave-bar" x1="100" y1="0" x2="100" y2="-45" stroke="var(--wave-inactive)" />
      <line class="wave-bar" x1="110" y1="0" x2="110" y2="-15" stroke="var(--wave-inactive)" />
      <line class="wave-bar" x1="120" y1="0" x2="120" y2="-8" stroke="var(--wave-inactive)" />
    </g>
  </g>
</svg>
