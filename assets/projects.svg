<svg width="1600" height="160" viewBox="0 0 1600 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pGrad" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="pClip"><rect width="1600" height="160" rx="24"/></clipPath>
    <style>
      .win { animation: hover 5s ease-in-out infinite; }
      @keyframes hover { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      .eyebrow { font: 600 14px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #8B5CF6; letter-spacing: 4px; }
      .title { font: 700 34px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #FFFFFF; letter-spacing: -0.5px; }
    </style>
  </defs>
  <g clip-path="url(#pClip)">
    <rect width="1600" height="160" fill="#09090B"/>
    <rect width="1600" height="160" fill="#0C0C11"/>
    <line x1="0" y1="159" x2="1600" y2="159" stroke="url(#pGrad)" stroke-width="1"/>

    <text x="60" y="60" class="eyebrow">SELECTED WORK</text>
    <text x="60" y="104" class="title">Featured Projects</text>

    <g transform="translate(1310,38)">
      <g class="win">
        <rect width="90" height="64" rx="10" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.1"/>
        <circle cx="16" cy="16" r="3" fill="#3B82F6"/>
        <circle cx="28" cy="16" r="3" fill="#6366F1"/>
        <circle cx="40" cy="16" r="3" fill="#8B5CF6"/>
        <line x1="12" y1="30" x2="78" y2="30" stroke="#FFFFFF" stroke-opacity="0.12"/>
        <line x1="12" y1="42" x2="60" y2="42" stroke="#FFFFFF" stroke-opacity="0.08"/>
        <line x1="12" y1="52" x2="70" y2="52" stroke="#FFFFFF" stroke-opacity="0.08"/>
      </g>
    </g>
    <g transform="translate(1430,54)">
      <g class="win" style="animation-delay:1s">
        <rect width="90" height="64" rx="10" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.1"/>
        <circle cx="16" cy="16" r="3" fill="#3B82F6"/>
        <circle cx="28" cy="16" r="3" fill="#6366F1"/>
        <circle cx="40" cy="16" r="3" fill="#8B5CF6"/>
        <line x1="12" y1="30" x2="78" y2="30" stroke="#FFFFFF" stroke-opacity="0.12"/>
        <line x1="12" y1="42" x2="55" y2="42" stroke="#FFFFFF" stroke-opacity="0.08"/>
      </g>
    </g>
  </g>
</svg>
