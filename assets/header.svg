<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="55%" stop-color="#0B0B10"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="threadGrad" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#A1A1AA"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <clipPath id="clip">
      <rect width="1600" height="420" rx="28"/>
    </clipPath>
    <style>
      .float1 { animation: floatY 7s ease-in-out infinite; }
      .float2 { animation: floatY 9s ease-in-out infinite 1.2s; }
      .float3 { animation: floatY 8s ease-in-out infinite 0.6s; }
      @keyframes floatY {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-16px); }
      }
      .pulse { animation: pulseOpacity 3.2s ease-in-out infinite; }
      @keyframes pulseOpacity {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
      .drawline { stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: draw 2.6s ease-out forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      .eyebrow { font: 600 15px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; letter-spacing: 5px; fill: #8B5CF6; text-transform: uppercase; }
      .name { font: 700 62px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: url(#textGrad); letter-spacing: -1.5px; }
      .role { font: 400 22px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #A1A1AA; letter-spacing: 0.2px; }
      .tag { font: 600 16px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1600" height="420" fill="url(#bgGrad)"/>
    <rect width="1600" height="420" fill="url(#grid)"/>

    <circle class="float1" cx="1360" cy="90" r="180" fill="url(#orb1)"/>
    <circle class="float2" cx="1480" cy="300" r="150" fill="url(#orb2)"/>
    <circle class="float3" cx="1220" cy="330" r="120" fill="url(#orb3)"/>

    <!-- neural thread signature -->
    <path class="drawline" d="M 60 360 C 300 300, 420 380, 640 330 S 980 250, 1180 300 S 1420 340, 1540 280"
          stroke="url(#threadGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <circle class="pulse" cx="640" cy="330" r="4.5" fill="#6366F1"/>
    <circle class="pulse" cx="1180" cy="300" r="4.5" fill="#8B5CF6"/>
    <circle class="pulse" cx="1540" cy="280" r="4.5" fill="#3B82F6"/>

    <rect x="60" y="70" width="192" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <circle cx="82" cy="90" r="5" fill="#4ADE80"/>
    <text x="98" y="96" class="tag">open to work</text>

    <text x="60" y="170" class="eyebrow">SOFTWARE DEVELOPER · AI ENTHUSIAST</text>
    <text x="58" y="235" class="name">Priyanshi Pitroda</text>
    <text x="60" y="278" class="role">Full-Stack Engineer building calm, intelligent products</text>
    <text x="60" y="308" class="role" fill-opacity="0.7">MCA @ Parul University · React · Flask · PyTorch</text>

    <rect x="59" y="359" width="1482" height="1" fill="#FFFFFF" fill-opacity="0.06"/>
  </g>
</svg>
