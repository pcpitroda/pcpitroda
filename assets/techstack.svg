<svg width="1600" height="200" viewBox="0 0 1600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tsGrad" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="tsClip"><rect width="1600" height="200" rx="24"/></clipPath>
    <style>
      @keyframes slideInChip1 {
        0% { opacity: 0; transform: translateX(20px); }
        100% { opacity: 1; transform: translateX(0px); }
      }
      @keyframes slideInChip2 {
        0% { opacity: 0; transform: translateX(20px); }
        100% { opacity: 1; transform: translateX(0px); }
      }
      @keyframes slideInChip3 {
        0% { opacity: 0; transform: translateX(20px); }
        100% { opacity: 1; transform: translateX(0px); }
      }
      @keyframes slideInChip4 {
        0% { opacity: 0; transform: translateX(20px); }
        100% { opacity: 1; transform: translateX(0px); }
      }
      
      @keyframes floatChip1 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      @keyframes floatChip2 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      @keyframes floatChip3 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      @keyframes floatChip4 {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      
      .chip1 { 
        animation: slideInChip1 0.8s ease-out 0.2s both, floatChip1 3.5s ease-in-out 2s infinite;
      }
      .chip2 { 
        animation: slideInChip2 0.8s ease-out 0.4s both, floatChip2 3.5s ease-in-out 2.3s infinite;
      }
      .chip3 { 
        animation: slideInChip3 0.8s ease-out 0.6s both, floatChip3 3.5s ease-in-out 2.6s infinite;
      }
      .chip4 { 
        animation: slideInChip4 0.8s ease-out 0.8s both, floatChip4 3.5s ease-in-out 2.9s infinite;
      }
    </style>
  </defs>
  
  <g clip-path="url(#tsClip)">
    <!-- Background -->
    <rect width="1600" height="200" fill="#09090B"/>
    
    <!-- Top border gradient -->
    <line x1="0" y1="0" x2="1600" y2="0" stroke="url(#tsGrad)" stroke-width="1"/>
    
    <!-- Badge in top-left corner (24px padding) -->
    <g>
      <rect x="24" y="24" width="100" height="36" rx="18" fill="#6366F1" fill-opacity="0.12" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1"/>
      <text x="74" y="46" text-anchor="middle" font-family="'Segoe UI', ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#E4E4E7" letter-spacing="1px">FEATURED</text>
    </g>
    
    <!-- Section heading below badge with 24px gap -->
    <text x="60" y="100" font-family="'Segoe UI', ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8B5CF6" letter-spacing="4px">CAPABILITIES</text>
    
    <!-- Main title -->
    <text x="60" y="150" font-family="'Segoe UI', ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5px">Tech Stack</text>
    
    <!-- Animated chips - with proper spacing and continuous floating animation -->
    
    <!-- Chip 1: AI / PyTorch -->
    <g class="chip1">
      <rect x="800" y="60" width="130" height="40" rx="20" fill="#6366F1" fill-opacity="0.12" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1"/>
      <text x="865" y="86" text-anchor="middle" font-family="'Segoe UI', ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E4E4E7">AI / PyTorch</text>
    </g>
    
    <!-- Chip 2: React + Vite -->
    <g class="chip2">
      <rect x="960" y="60" width="130" height="40" rx="20" fill="#3B82F6" fill-opacity="0.12" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1"/>
      <text x="1025" y="86" text-anchor="middle" font-family="'Segoe UI', ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E4E4E7">React + Vite</text>
    </g>
    
    <!-- Chip 3: Flask API -->
    <g class="chip3">
      <rect x="1120" y="60" width="120" height="40" rx="20" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-opacity="0.4" stroke-width="1"/>
      <text x="1180" y="86" text-anchor="middle" font-family="'Segoe UI', ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E4E4E7">Flask API</text>
    </g>
    
    <!-- Chip 4: Firebase -->
    <g class="chip4">
      <rect x="1270" y="60" width="130" height="40" rx="20" fill="#6366F1" fill-opacity="0.12" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1"/>
      <text x="1335" y="86" text-anchor="middle" font-family="'Segoe UI', ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E4E4E7">Firebase</text>
    </g>
  </g>
</svg>