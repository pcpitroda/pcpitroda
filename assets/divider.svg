<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 10" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --border-color: #E6E4DF;
        --accent-primary: #C5A880;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --border-color: #222222;
          --accent-primary: #E0C097;
        }
      }
      .line {
        stroke: var(--border-color);
        stroke-width: 1;
        transition: stroke 0.4s ease;
      }
      .marker {
        fill: var(--bg-color);
        stroke: var(--accent-primary);
        stroke-width: 1;
        transition: stroke 0.4s ease;
      }
    </style>
  </defs>
  <line class="line" x1="0" y1="5" x2="1200" y2="5" />
  <!-- Minimal diamond marker in the center -->
  <polygon class="marker" points="600,1 604,5 600,9 596,5" fill="#FAF9F6" />
</svg>
