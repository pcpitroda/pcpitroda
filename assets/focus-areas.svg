<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --accent-secondary: #0F766E;
        --card-bg: rgba(18, 18, 18, 0.01);
        --border-color: #E6E4DF;
        --grid-line: rgba(18, 18, 18, 0.04);
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --accent-secondary: #10B981;
          --card-bg: rgba(250, 249, 246, 0.02);
          --border-color: #222222;
          --grid-line: rgba(250, 249, 246, 0.02);
        }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .card-rect { fill: var(--card-bg); stroke: var(--border-color); stroke-width: 1; transition: fill 0.4s ease, stroke 0.4s ease; }
      
      .text-title { font-family: var(--font-serif); font-size: 26px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-num { font-family: var(--font-mono); font-size: 11px; fill: var(--accent-primary); letter-spacing: 0.15em; font-weight: 500; }
      .text-tag { font-family: var(--font-mono); font-size: 12px; fill: var(--text-secondary); transition: fill 0.4s ease; }
      .text-body { font-family: var(--font-sans); font-size: 14px; fill: var(--text-secondary); line-height: 1.5; transition: fill 0.4s ease; }
      
      .chart-line { fill: none; stroke: var(--accent-primary); stroke-width: 1.5; }
      .chart-dots { fill: var(--accent-secondary); }
      .chart-grid { stroke: var(--grid-line); stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />

  <!-- Card 1: Intelligence Models (AI & ML) -->
  <g transform="translate(100, 40)">
    <rect class="card-rect" width="310" height="380" rx="4" />
    <text class="text-num" x="30" y="45">01 / INTELLIGENCE</text>
    <text class="text-title" x="30" y="85">Artificial Intelligence &amp;</text>
    <text class="text-title" x="30" y="115">Machine Learning</text>
    
    <text class="text-body" x="30" y="160">
      <tspan x="30" dy="0">Developing algorithmic pipelines that</tspan>
      <tspan x="30" dy="20">model linguistic patterns and synthesize</tspan>
      <tspan x="30" dy="20">complex computer vision structures.</tspan>
    </text>

    <!-- Custom vector chart: Decision Boundary visualization -->
    <g transform="translate(30, 240)" opacity="0.8">
      <rect x="0" y="0" width="250" height="100" fill="none" class="chart-grid" stroke-width="1" />
      <line class="chart-grid" x1="0" y1="50" x2="250" y2="50" />
      <line class="chart-grid" x1="125" y1="0" x2="125" y2="100" />
      
      <!-- SVM decision boundary curve -->
      <path class="chart-line" d="M 10 90 Q 110 50, 240 10" stroke-width="1.5" />
      <path class="chart-line" d="M 10 75 Q 110 35, 240 -5" stroke-width="0.75" stroke-dasharray="3 3" opacity="0.5" />
      <path class="chart-line" d="M 10 105 Q 110 65, 240 25" stroke-width="0.75" stroke-dasharray="3 3" opacity="0.5" />
      
      <!-- Data points -->
      <circle class="chart-dots" cx="40" cy="40" r="3" />
      <circle class="chart-dots" cx="70" cy="20" r="3" />
      <circle class="chart-dots" cx="160" cy="80" r="3" fill="var(--accent-primary)" />
      <circle class="chart-dots" cx="190" cy="65" r="3" fill="var(--accent-primary)" />
      <circle class="chart-dots" cx="210" cy="45" r="3" fill="var(--accent-primary)" />
    </g>
  </g>

  <!-- Card 2: Data Synthesis (Data Science & Analytics) - Asymmetric Offset Downward -->
  <g transform="translate(445, 60)">
    <rect class="card-rect" width="310" height="380" rx="4" />
    <text class="text-num" x="30" y="45">02 / SYNTHESIS</text>
    <text class="text-title" x="30" y="85">Data Science &amp;</text>
    <text class="text-title" x="30" y="115">Data Analytics</text>
    
    <text class="text-body" x="30" y="160">
      <tspan x="30" dy="0">Extracting structure from datasets,</tspan>
      <tspan x="30" dy="20">detecting mathematical anomalies,</tspan>
      <tspan x="30" dy="20">and creating elegant representations.</tspan>
    </text>

    <!-- Custom vector chart: Data Distribution curve -->
    <g transform="translate(30, 240)" opacity="0.8">
      <rect x="0" y="0" width="250" height="100" fill="none" class="chart-grid" stroke-width="1" />
      <!-- Normal Distribution curves -->
      <path class="chart-line" d="M 10 95 C 70 95, 100 10, 125 10 C 150 10, 180 95, 240 95" stroke-width="1.5" />
      <path class="chart-line" d="M 40 95 C 80 95, 110 40, 125 40 C 140 40, 170 95, 210 95" stroke-width="1" stroke="var(--accent-secondary)" />
      
      <!-- Peak indicator line -->
      <line x1="125" y1="10" x2="125" y2="95" stroke="var(--accent-primary)" stroke-dasharray="2 2" stroke-width="1" />
      <circle cx="125" cy="10" r="3" fill="var(--accent-primary)" />
    </g>
  </g>

  <!-- Card 3: Execution (Web Development & Engineering) -->
  <g transform="translate(790, 40)">
    <rect class="card-rect" width="310" height="380" rx="4" />
    <text class="text-num" x="30" y="45">03 / EXECUTION</text>
    <text class="text-title" x="30" y="85">Web Architectures &amp;</text>
    <text class="text-title" x="30" y="115">Systems Engineering</text>
    
    <text class="text-body" x="30" y="160">
      <tspan x="30" dy="0">Constructing minimal, accessible,</tspan>
      <tspan x="30" dy="20">and fast web interfaces that prioritize</tspan>
      <tspan x="30" dy="20">performance and code readability.</tspan>
    </text>

    <!-- Custom vector chart: Code Structure nodes -->
    <g transform="translate(30, 240)" opacity="0.8">
      <rect x="0" y="0" width="250" height="100" fill="none" class="chart-grid" stroke-width="1" />
      
      <!-- Architectural system diagram -->
      <line x1="40" y1="50" x2="100" y2="25" stroke="var(--text-secondary)" stroke-dasharray="2 1" stroke-width="1" />
      <line x1="40" y1="50" x2="100" y2="75" stroke="var(--text-secondary)" stroke-dasharray="2 1" stroke-width="1" />
      <line x1="100" y1="25" x2="200" y2="25" stroke="var(--accent-primary)" stroke-width="1.5" />
      <line x1="100" y1="75" x2="200" y2="75" stroke="var(--accent-secondary)" stroke-width="1" />
      <line x1="200" y1="25" x2="200" y2="75" stroke="var(--text-secondary)" stroke-dasharray="2 1" stroke-width="1" />

      <circle cx="40" cy="50" r="12" fill="var(--bg-color)" stroke="var(--text-primary)" stroke-width="1" />
      <circle cx="40" cy="50" r="4" fill="var(--text-primary)" />
      
      <circle cx="100" cy="25" r="8" fill="var(--bg-color)" stroke="var(--accent-primary)" stroke-width="1" />
      <circle cx="100" cy="75" r="8" fill="var(--bg-color)" stroke="var(--accent-secondary)" stroke-width="1" />
      
      <circle cx="200" cy="25" r="8" fill="var(--bg-color)" stroke="var(--accent-primary)" stroke-width="1" />
      <circle cx="200" cy="75" r="8" fill="var(--bg-color)" stroke="var(--accent-secondary)" stroke-width="1" />
    </g>
  </g>
</svg>
