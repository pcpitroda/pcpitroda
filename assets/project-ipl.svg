<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --accent-secondary: #0F766E;
        --card-bg: rgba(18, 18, 18, 0.01);
        --border-color: #E6E4DF;
        --grid-line: rgba(18, 18, 18, 0.03);
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --accent-secondary: #10B981;
          --card-bg: rgba(250, 249, 246, 0.02);
          --border-color: #222222;
          --grid-line: rgba(250, 249, 246, 0.02);
        }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .card-rect { fill: var(--card-bg); stroke: var(--border-color); stroke-width: 1; transition: fill 0.4s ease, stroke 0.4s ease; }
      
      .text-title { font-family: var(--font-serif); font-size: 24px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-meta { font-family: var(--font-mono); font-size: 10px; fill: var(--accent-primary); letter-spacing: 0.15em; font-weight: 500; }
      .text-body { font-family: var(--font-sans); font-size: 13px; fill: var(--text-secondary); line-height: 1.5; transition: fill 0.4s ease; }
      
      .grid-lines { stroke: var(--grid-line); stroke-width: 1; }
      .trend-line { fill: none; stroke: var(--accent-primary); stroke-width: 1.75; }
      .scatter-point { fill: var(--accent-secondary); }
      .scatter-point-alt { fill: var(--text-secondary); opacity: 0.5; transition: fill 0.4s ease; }
      .axis-line { stroke: var(--border-color); stroke-width: 1; transition: stroke 0.4s ease; }
    </style>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />
  <rect class="card-rect" x="10" y="10" width="580" height="300" rx="4" />

  <!-- Left: Editorial details -->
  <g transform="translate(40, 50)">
    <text class="text-meta">PROJECT 04 / DATA ANALYTICS</text>
    <text class="text-title" x="0" y="35">IPL Analysis</text>
    
    <text class="text-body" x="0" y="80">
      <tspan x="0" dy="0">A statistical study analyzing scores and</tspan>
      <tspan x="0" dy="20">player performances across seasons.</tspan>
      <tspan x="0" dy="20">Generates correlation maps, predictive</tspan>
      <tspan x="0" dy="20">run models, and telemetry views.</tspan>
    </text>

    <!-- Stat table info -->
    <g transform="translate(0, 180)">
      <line x1="0" y1="0" x2="220" y2="0" stroke="var(--border-color)" stroke-width="0.75" />
      <text class="text-meta" x="0" y="20">SAMPLES: 12.4K</text>
      <text class="text-meta" x="120" y="20">R² ACCURACY: 0.91</text>
    </g>
  </g>

  <!-- Right: Data Scatter & Trend Plot -->
  <g transform="translate(320, 50)">
    <!-- Main Plot Grid Box -->
    <rect x="0" y="0" width="240" height="210" fill="none" class="grid-lines" stroke="var(--border-color)" stroke-width="0.75" />
    <line class="grid-lines" x1="60" y1="0" x2="60" y2="210" />
    <line class="grid-lines" x1="120" y1="0" x2="120" y2="210" />
    <line class="grid-lines" x1="180" y1="0" x2="180" y2="210" />
    <line class="grid-lines" x1="0" y1="70" x2="240" y2="70" />
    <line class="grid-lines" x1="0" y1="140" x2="240" y2="140" />

    <!-- Trend Regression Line -->
    <path class="trend-line" d="M 20 185 Q 110 110, 220 30" />
    
    <!-- Scatter points -->
    <circle class="scatter-point" cx="30" cy="180" r="3.5" />
    <circle class="scatter-point" cx="50" cy="170" r="3.5" />
    <circle class="scatter-point" cx="70" cy="140" r="3.5" />
    <circle class="scatter-point" cx="100" cy="120" r="3.5" />
    <circle class="scatter-point" cx="120" cy="100" r="3.5" />
    <circle class="scatter-point" cx="150" cy="80" r="3.5" />
    <circle class="scatter-point" cx="170" cy="75" r="3.5" />
    <circle class="scatter-point" cx="200" cy="45" r="3.5" />
    <circle class="scatter-point" cx="215" cy="40" r="3.5" />
    
    <!-- Muted Outliers -->
    <circle class="scatter-point-alt" cx="45" cy="110" r="3" />
    <circle class="scatter-point-alt" cx="95" cy="190" r="3" />
    <circle class="scatter-point-alt" cx="130" cy="60" r="3" />
    <circle class="scatter-point-alt" cx="180" cy="150" r="3" />
    
    <!-- Axis tags in monospace -->
    <text font-family="var(--font-mono)" font-size="8px" fill="var(--text-secondary)" x="10" y="222" transition="fill 0.4s ease">RUN RATE</text>
    <text font-family="var(--font-mono)" font-size="8px" fill="var(--text-secondary)" x="200" y="222" transition="fill 0.4s ease">OVERS</text>
  </g>
</svg>
