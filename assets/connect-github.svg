<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --border-color: #E6E4DF;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --card-bg: rgba(18, 18, 18, 0.01);
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --border-color: #222222;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --card-bg: rgba(250, 249, 246, 0.02);
        }
      }

      svg {
        cursor: pointer;
      }

      .card-rect {
        fill: var(--card-bg);
        stroke: var(--border-color);
        stroke-width: 1;
        transition: stroke 0.3s ease, fill 0.3s ease;
      }
      
      .text-title {
        font-family: var(--font-serif);
        font-size: 18px;
        fill: var(--text-primary);
        transition: fill 0.3s ease;
      }
      
      .text-meta {
        font-family: var(--font-mono);
        font-size: 8px;
        fill: var(--text-secondary);
        letter-spacing: 0.1em;
        transition: fill 0.3s ease;
      }

      .arrow-path {
        fill: none;
        stroke: var(--text-secondary);
        stroke-width: 1.25;
        transition: stroke 0.3s ease, transform 0.3s ease;
        transform-origin: 220px 35px;
      }

      /* Hover states */
      svg:hover .card-rect {
        stroke: var(--accent-primary);
        fill: rgba(197, 168, 128, 0.04);
      }
      @media (prefers-color-scheme: dark) {
        svg:hover .card-rect {
          fill: rgba(224, 192, 151, 0.03);
        }
      }
      
      svg:hover .text-title {
        fill: var(--accent-primary);
      }
      
      svg:hover .text-meta {
        fill: var(--accent-primary);
      }
      
      svg:hover .arrow-path {
        stroke: var(--accent-primary);
        transform: translate(3px, -3px);
      }
    </style>
  </defs>

  <rect class="card-rect" x="0.5" y="0.5" width="259" height="69" rx="3" />
  
  <text class="text-meta" x="20" y="24">PORT/01</text>
  <text class="text-title" x="20" y="46">GitHub</text>
  
  <!-- Arrow Graphic -->
  <path class="arrow-path" d="M 215 35 L 225 35 M 221 31 L 225 35 L 221 39" />
</svg>
