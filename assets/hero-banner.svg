<svg width="100%" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Priya Pitroda — Full-Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#10131b"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="55%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- ambient glow -->
  <circle cx="140" cy="90" r="150" fill="#00E5FF" opacity="0.16" filter="url(#blur)">
    <animate attributeName="cy" values="90;130;90" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="340" r="170" fill="#7C3AED" opacity="0.20" filter="url(#blur)">
    <animate attributeName="cx" values="1080;1010;1080" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="40" r="120" fill="#38BDF8" opacity="0.10" filter="url(#blur)">
    <animate attributeName="opacity" values="0.06;0.18;0.06" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- floating geometry -->
  <g stroke="#00E5FF" stroke-opacity="0.35" fill="none">
    <rect x="960" y="70" width="24" height="24" rx="6" transform="rotate(18 972 82)">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -16;0 0" dur="4.5s" repeatCount="indefinite" additive="sum"/>
    </rect>
    <circle cx="1040" cy="140" r="5" fill="#38BDF8" fill-opacity="0.5" stroke="none">
      <animate attributeName="cy" values="140;120;140" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <rect x="1000" y="250" width="16" height="16" rx="4" stroke="#7C3AED" stroke-opacity="0.4">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 14;0 0" dur="5.2s" repeatCount="indefinite" additive="sum"/>
    </rect>
    <circle cx="80" cy="300" r="4" fill="#00E5FF" fill-opacity="0.5" stroke="none">
      <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- glass panel -->
  <rect x="90" y="128" width="760" height="176" rx="22" fill="#F8FAFC" fill-opacity="0.035" stroke="#F8FAFC" stroke-opacity="0.08" filter="url(#softBlur)"/>
  <rect x="90" y="128" width="760" height="2" rx="1" fill="#F8FAFC" fill-opacity="0.12"/>

  <text x="122" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="url(#txt)">Priya Pitroda</text>
  <text x="124" y="240" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#F8FAFC" fill-opacity="0.85">Full-Stack Developer &#183; AI Enthusiast &#183; Builder</text>

  <rect x="124" y="256" width="46" height="2" fill="url(#line)"/>
  <text x="124" y="284" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" letter-spacing="2.5" fill="#94A3B8">MCA STUDENT &#8212; BUILDING PRODUCTS WITH CODE &amp; CURIOSITY</text>

  <rect x="0" y="418" width="1200" height="2" fill="url(#line)"/>
</svg>
