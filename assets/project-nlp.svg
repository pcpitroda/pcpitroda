<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --accent-secondary: #0F766E;
        --card-bg: rgba(18, 18, 18, 0.01);
        --border-color: #E6E4DF;
        --node-line: rgba(18, 18, 18, 0.1);
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --accent-secondary: #10B981;
          --card-bg: rgba(250, 249, 246, 0.02);
          --border-color: #222222;
          --node-line: rgba(250, 249, 246, 0.1);
        }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .card-rect { fill: var(--card-bg); stroke: var(--border-color); stroke-width: 1; transition: fill 0.4s ease, stroke 0.4s ease; }
      
      .text-title { font-family: var(--font-serif); font-size: 24px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-meta { font-family: var(--font-mono); font-size: 10px; fill: var(--accent-primary); letter-spacing: 0.15em; font-weight: 500; }
      .text-body { font-family: var(--font-sans); font-size: 13px; fill: var(--text-secondary); line-height: 1.5; transition: fill 0.4s ease; }
      
      .link-line { stroke: var(--node-line); stroke-width: 1; fill: none; transition: stroke 0.4s ease; }
      .token-box { fill: var(--card-bg); stroke: var(--border-color); stroke-width: 1; rx: 3; transition: fill 0.4s ease, stroke 0.4s ease; }
      .token-text { font-family: var(--font-mono); font-size: 9px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .tag-text { font-family: var(--font-mono); font-size: 9px; fill: var(--accent-primary); font-weight: bold; }
    </style>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />
  <rect class="card-rect" x="10" y="10" width="580" height="300" rx="4" />

  <!-- Left: Editorial details -->
  <g transform="translate(40, 50)">
    <text class="text-meta">PROJECT 05 / NATURAL LANGUAGE PROCESSING</text>
    <text class="text-title" x="0" y="35">NLP Web App</text>
    
    <text class="text-body" x="0" y="80">
      <tspan x="0" dy="0">An interactive space deconstructing language</tspan>
      <tspan x="0" dy="20">patterns. Integrates tokenizers, syntactic</tspan>
      <tspan x="0" dy="20">dependency trees, and real-time sentiment</tspan>
      <tspan x="0" dy="20">classification algorithms.</tspan>
    </text>

    <!-- Language metrics -->
    <g transform="translate(0, 180)">
      <line x1="0" y1="0" x2="220" y2="0" stroke="var(--border-color)" stroke-width="0.75" />
      <text class="text-meta" x="0" y="20">MODELS: BERT • GPT</text>
      <text class="text-meta" x="120" y="20">VOCABULARY: 30K+</text>
    </g>
  </g>

  <!-- Right: Dependency Syntax Tree Diagram -->
  <g transform="translate(320, 50)">
    <!-- Root Node -->
    <rect class="token-box" x="80" y="10" width="60" height="24" />
    <text class="token-text" x="110" y="25" text-anchor="middle">ROOT</text>
    
    <!-- Level 1 Connections -->
    <path class="link-line" d="M 110 34 L 50 80 M 110 34 L 170 80" />

    <!-- Left Child: NP -->
    <rect class="token-box" x="20" y="80" width="60" height="24" stroke="var(--accent-primary)" />
    <text class="token-text" x="50" y="95" text-anchor="middle">NP</text>
    
    <!-- Right Child: VP -->
    <rect class="token-box" x="140" y="80" width="60" height="24" stroke="var(--accent-secondary)" />
    <text class="token-text" x="170" y="95" text-anchor="middle">VP</text>

    <!-- Level 2 Connections -->
    <path class="link-line" d="M 50 104 L 30 150 M 50 104 L 80 150 M 170 104 L 150 150 M 170 104 L 200 150" />

    <!-- Leaves -->
    <!-- Det -->
    <rect class="token-box" x="5" y="150" width="40" height="20" />
    <text class="token-text" x="25" y="163" text-anchor="middle">Det</text>
    <text class="tag-text" x="25" y="185" text-anchor="middle" fill="var(--text-secondary)">"The"</text>

    <!-- Noun -->
    <rect class="token-box" x="55" y="150" width="45" height="20" />
    <text class="token-text" x="775" y="163" text-anchor="middle">N</text> <!-- Corrected coordinates in text anchor -->
    <text class="token-text" x="77" y="163" text-anchor="middle">N</text>
    <text class="tag-text" x="77" y="185" text-anchor="middle" fill="var(--text-secondary)">"model"</text>

    <!-- Verb -->
    <rect class="token-box" x="125" y="150" width="40" height="20" />
    <text class="token-text" x="145" y="163" text-anchor="middle">V</text>
    <text class="tag-text" x="145" y="185" text-anchor="middle" fill="var(--text-secondary)">"learns"</text>

    <!-- Adverb/NP -->
    <rect class="token-box" x="175" y="150" width="55" height="20" />
    <text class="token-text" x="202" y="163" text-anchor="middle">Adv</text>
    <text class="tag-text" x="202" y="185" text-anchor="middle" fill="var(--text-secondary)">"rapidly"</text>
  </g>
</svg>
