<svg width="100%" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#10131c"/>
    </linearGradient>
    <linearGradient id="acc3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="260" fill="url(#bg4)"/>

  <g>
    <rect x="40" y="30" width="360" height="200" rx="18" fill="#F8FAFC" fill-opacity="0.035" stroke="#F8FAFC" stroke-opacity="0.09"/>
    <circle cx="80" cy="76" r="4" fill="#00E5FF">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="70" y="130" font-size="22" font-weight="700" fill="#F8FAFC">Full-Stack</text>
    <text x="70" y="156" font-size="22" font-weight="700" fill="#F8FAFC">Project Builder</text>
    <text x="70" y="190" font-size="14" fill="#94A3B8">Shipping end-to-end apps</text>
    <text x="70" y="210" font-size="14" fill="#94A3B8">from idea to deployment.</text>
  </g>

  <g>
    <rect x="420" y="30" width="360" height="200" rx="18" fill="#F8FAFC" fill-opacity="0.035" stroke="#F8FAFC" stroke-opacity="0.09"/>
    <circle cx="460" cy="76" r="4" fill="#38BDF8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <text x="450" y="130" font-size="22" font-weight="700" fill="#F8FAFC">AI / ML</text>
    <text x="450" y="156" font-size="22" font-weight="700" fill="#F8FAFC">Explorer</text>
    <text x="450" y="190" font-size="14" fill="#94A3B8">Applying computer vision &amp;</text>
    <text x="450" y="210" font-size="14" fill="#94A3B8">NLP to real problems.</text>
  </g>

  <g>
    <rect x="800" y="30" width="360" height="200" rx="18" fill="#F8FAFC" fill-opacity="0.035" stroke="#F8FAFC" stroke-opacity="0.09"/>
    <circle cx="840" cy="76" r="4" fill="#7C3AED">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <text x="830" y="130" font-size="22" font-weight="700" fill="#F8FAFC">Open Source</text>
    <text x="830" y="156" font-size="22" font-weight="700" fill="#F8FAFC">Learner</text>
    <text x="830" y="190" font-size="14" fill="#94A3B8">Reading, contributing, and</text>
    <text x="830" y="210" font-size="14" fill="#94A3B8">learning in the open.</text>
  </g>
