<svg width="420" height="520" viewBox="0 0 420 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="420" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#131318"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="cardBorder" x1="0" y1="0" x2="420" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="avatarRing" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </radialGradient>
    <radialGradient id="cardGlow" cx="0.5" cy="0" r="0.6">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClip"><rect x="2" y="2" width="416" height="516" rx="24"/></clipPath>
    <style>
      .spin { animation: spin 26s linear infinite; transform-origin: 210px 170px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .breathe { animation: breathe 3.6s ease-in-out infinite; transform-origin: 210px 170px; }
      @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
      .name { font: 700 27px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #FFFFFF; letter-spacing: -0.4px; }
      .role { font: 500 14px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #A1A1AA; }
      .badge { font: 600 11px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #C7D2FE; letter-spacing: 0.5px; }
      .handle { font: 500 13px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #71717A; }
    </style>
  </defs>

  <rect x="1" y="1" width="418" height="518" rx="25" fill="url(#cardBorder)"/>
  <g clip-path="url(#cardClip)">
    <rect width="420" height="520" fill="url(#cardBg)"/>
    <rect width="420" height="220" fill="url(#cardGlow)"/>

    <g class="spin" opacity="0.5">
      <circle cx="210" cy="170" r="86" stroke="#6366F1" stroke-width="1" fill="none" stroke-dasharray="1 9"/>
    </g>
    <g class="breathe">
      <circle cx="210" cy="170" r="60" fill="url(#avatarRing)" opacity="0.9"/>
      <circle cx="210" cy="170" r="52" fill="#09090B"/>
      <text x="210" y="188" text-anchor="middle" font="700 44px 'Segoe UI', ui-sans-serif, system-ui, sans-serif" fill="#FFFFFF">PP</text>
    </g>

    <text x="210" y="300" text-anchor="middle" class="name">Priyanshi Pitroda</text>
    <text x="210" y="326" text-anchor="middle" class="role">Full-Stack Developer · AI Enthusiast</text>
    <text x="210" y="352" text-anchor="middle" class="handle">@pcpitroda</text>

    <line x1="40" y1="382" x2="380" y2="382" stroke="#FFFFFF" stroke-opacity="0.08"/>

    <g transform="translate(60,406)">
      <rect width="90" height="30" rx="15" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.35"/>
      <text x="45" y="20" text-anchor="middle" class="badge">REACT</text>
    </g>
    <g transform="translate(165,406)">
      <rect width="90" height="30" rx="15" fill="#6366F1" fill-opacity="0.14" stroke="#6366F1" stroke-opacity="0.35"/>
      <text x="45" y="20" text-anchor="middle" class="badge">PYTORCH</text>
    </g>
    <g transform="translate(270,406)">
      <rect width="90" height="30" rx="15" fill="#8B5CF6" fill-opacity="0.14" stroke="#8B5CF6" stroke-opacity="0.35"/>
      <text x="45" y="20" text-anchor="middle" class="badge">FLASK</text>
    </g>

    <text x="210" y="470" text-anchor="middle" class="handle" fill-opacity="0.7">MCA · Parul University</text>
    <text x="210" y="494" text-anchor="middle" class="handle" fill-opacity="0.5">Ahmedabad, India</text>
  </g>
</svg>
