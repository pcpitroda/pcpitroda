<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 32" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --border-color: #E6E4DF;
        --text-primary: #121212;
        --accent-secondary: #0F766E;
        --card-bg: rgba(18, 18, 18, 0.01);
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --border-color: #222222;
          --text-primary: #FAF9F6;
          --accent-secondary: #10B981;
          --card-bg: rgba(250, 249, 246, 0.02);
        }
      }

      svg {
        cursor: pointer;
      }

      .btn-rect {
        fill: var(--card-bg);
        stroke: var(--border-color);
        stroke-width: 1;
        transition: stroke 0.3s ease, fill 0.3s ease;
      }

      .btn-text {
        font-family: var(--font-mono);
        font-size: 8px;
        font-weight: 500;
        fill: var(--text-primary);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        transition: fill 0.3s ease;
      }

      .arrow-path {
        fill: none;
        stroke: var(--text-primary);
        stroke-width: 1;
        transition: stroke 0.3s ease, transform 0.3s ease;
        transform-origin: 108px 16px;
      }

      /* Hover States */
      svg:hover .btn-rect {
        stroke: var(--accent-secondary);
        fill: rgba(16, 185, 129, 0.04);
      }
      @media (prefers-color-scheme: dark) {
        svg:hover .btn-rect {
          fill: rgba(16, 185, 129, 0.03);
        }
      }

      svg:hover .btn-text {
        fill: var(--accent-secondary);
      }

      svg:hover .arrow-path {
        stroke: var(--accent-secondary);
        transform: translate(2px, -2px);
      }
    </style>
  </defs>

  <rect class="btn-rect" x="0.5" y="0.5" width="129" height="31" rx="2" />
  <text class="btn-text" x="16" y="19">LAUNCH LIVE</text>
  <path class="arrow-path" d="M 102 18 L 108 12 M 104 12 L 108 12 L 108 16" />
</svg>
