<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --accent-secondary: #0F766E;
        --border-color: #E6E4DF;
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --accent-secondary: #10B981;
          --border-color: #222222;
        }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .border-line { stroke: var(--border-color); stroke-width: 1; transition: stroke 0.4s ease; }
      
      .text-title { font-family: var(--font-serif); font-size: 20px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-meta { font-family: var(--font-mono); font-size: 10px; fill: var(--accent-primary); letter-spacing: 0.15em; font-weight: 500; text-transform: uppercase; }
      .text-body { font-family: var(--font-sans); font-size: 14px; fill: var(--text-secondary); transition: fill 0.4s ease; }
      .bullet-gold { fill: var(--accent-primary); }
      .bullet-emerald { fill: var(--accent-secondary); }
    </style>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />

  <!-- Grid separation -->
  <line class="border-line" x1="80" y1="0" x2="80" y2="240" />
  <line class="border-line" x1="1120" y1="0" x2="1120" y2="240" />
  <line class="border-line" x1="80" y1="40" x2="1120" y2="40" />
  <line class="border-line" x1="80" y1="200" x2="1120" y2="200" />
  <line class="border-line" x1="600" y1="40" x2="600" y2="200" />

  <!-- Left: Learning Horizons -->
  <g transform="translate(120, 65)">
    <text class="text-meta">EXPLORATION MATRIX</text>
    <text class="text-title" x="0" y="30">Learning Horizons</text>
    
    <g transform="translate(0, 60)">
      <!-- Item 1 -->
      <circle cx="5" cy="5" r="3" class="bullet-gold" />
      <text class="text-body" x="20" y="9">Natural Language Architectures &amp; Synthesis Models</text>

      <!-- Item 2 -->
      <circle cx="5" cy="30" r="3" class="bullet-gold" />
      <text class="text-body" x="20" y="34">Advanced Neural Computer Vision &amp; Spatial Parsing</text>

      <!-- Item 3 -->
      <circle cx="5" cy="55" r="3" class="bullet-gold" />
      <text class="text-body" x="20" y="59">Statistical Big Data Modeling &amp; Anomaly Analysis</text>
    </g>
  </g>

  <!-- Right: Current Vector -->
  <g transform="translate(640, 65)">
    <text class="text-meta">ACTIVE TARGETS</text>
    <text class="text-title" x="0" y="30">Current Vector</text>
    
    <g transform="translate(0, 60)">
      <!-- Item 1 -->
      <circle cx="5" cy="5" r="3" class="bullet-emerald" />
      <text class="text-body" x="20" y="9">Master of Computer Applications Academic Rigor</text>

      <!-- Item 2 -->
      <circle cx="5" cy="30" r="3" class="bullet-emerald" />
      <text class="text-body" x="20" y="34">Architecting scalable AI pipeline scripts</text>

      <!-- Item 3 -->
      <circle cx="5" cy="55" r="3" class="bullet-emerald" />
      <text class="text-body" x="20" y="59">Synthesizing learning theories into practical software</text>
    </g>
  </g>
</svg>
