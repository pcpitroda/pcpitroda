<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --accent-secondary: #0F766E;
        --border-color: #E6E4DF;
        --bar-bg: #E6E4DF;
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --accent-secondary: #10B981;
          --border-color: #222222;
          --bar-bg: #222222;
        }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .border-line { stroke: var(--border-color); stroke-width: 1; transition: stroke 0.4s ease; }
      
      .text-num { font-family: var(--font-serif); font-size: 40px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-label { font-family: var(--font-sans); font-size: 11px; fill: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase; transition: fill 0.4s ease; }
      .text-meta { font-family: var(--font-mono); font-size: 11px; fill: var(--accent-primary); letter-spacing: 0.15em; font-weight: 500; text-transform: uppercase; }
      .text-title { font-family: var(--font-serif); font-size: 22px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-mono { font-family: var(--font-mono); font-size: 12px; fill: var(--text-secondary); transition: fill 0.4s ease; }
      
      .lang-bar { fill: var(--bar-bg); rx: 2; transition: fill 0.4s ease; }
      .lang-fill-python { fill: var(--accent-primary); rx: 2; }
      .lang-fill-web { fill: var(--accent-secondary); rx: 2; }
      .lang-fill-data { fill: var(--text-primary); rx: 2; transition: fill 0.4s ease; }
    </style>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />

  <!-- Surrounding grid line framework -->
  <line class="border-line" x1="80" y1="0" x2="80" y2="420" />
  <line class="border-line" x1="1120" y1="0" x2="1120" y2="420" />
  <line class="border-line" x1="80" y1="60" x2="1120" y2="60" />
  <line class="border-line" x1="80" y1="360" x2="1120" y2="360" />
  <line class="border-line" x1="500" y1="60" x2="500" y2="360" />
  <line class="border-line" x1="820" y1="60" x2="820" y2="360" />

  <!-- Column 1: Core Metrics -->
  <g transform="translate(120, 90)">
    <text class="text-meta">INDEXED LEDGER</text>
    <text class="text-title" x="0" y="30">Code Metrics</text>
    
    <g transform="translate(0, 75)">
      <!-- Metric Item 1 -->
      <text class="text-num" x="0" y="0">2.4k</text>
      <text class="text-label" x="0" y="16">Commits Registered</text>
      
      <!-- Metric Item 2 -->
      <text class="text-num" x="180" y="0">140+</text>
      <text class="text-label" x="180" y="16">Pull Requests</text>

      <!-- Metric Item 3 -->
      <text class="text-num" x="0" y="100">96%</text>
      <text class="text-label" x="0" y="116">Consistency Quotient</text>
      
      <!-- Metric Item 4 -->
      <text class="text-num" x="180" y="100">32</text>
      <text class="text-label" x="180" y="116">Open Source Nodes</text>
    </g>
  </g>

  <!-- Column 2: Language Distributions -->
  <g transform="translate(540, 90)">
    <text class="text-meta">COMPILER TELEMETRY</text>
    <text class="text-title" x="0" y="30">Language Focus</text>
    
    <g transform="translate(0, 75)">
      <!-- Python -->
      <text class="text-label" x="0" y="0">Python</text>
      <text class="text-mono" x="300" y="0" text-anchor="end">48%</text>
      <rect class="lang-bar" x="0" y="8" width="300" height="4" />
      <rect class="lang-fill-python" x="0" y="8" width="144" height="4" />

      <!-- JS/TS -->
      <text class="text-label" x="0" y="45">JavaScript / TypeScript</text>
      <text class="text-mono" x="300" y="45" text-anchor="end">32%</text>
      <rect class="lang-bar" x="0" y="53" width="300" height="4" />
      <rect class="lang-fill-web" x="0" y="53" width="96" height="4" />

      <!-- SQL / Data -->
      <text class="text-label" x="0" y="90">Structured Query / R</text>
      <text class="text-mono" x="300" y="90" text-anchor="end">12%</text>
      <rect class="lang-bar" x="0" y="98" width="300" height="4" />
      <rect class="lang-fill-data" x="0" y="98" width="36" height="4" />

      <!-- Others -->
      <text class="text-label" x="0" y="135">Others (C++, Java)</text>
      <text class="text-mono" x="300" y="135" text-anchor="end">8%</text>
      <rect class="lang-bar" x="0" y="143" width="300" height="4" />
      <rect class="lang-bar" x="0" y="143" width="24" height="4" fill="var(--text-secondary)" />
    </g>
  </g>

  <!-- Column 3: Highlights & Events -->
  <g transform="translate(860, 90)">
    <text class="text-meta">ACTIVITY JOURNAL</text>
    <text class="text-title" x="0" y="30">Recent Nodes</text>
    
    <g transform="translate(0, 75)">
      <!-- Event 1 -->
      <text class="text-mono" x="0" y="0" fill="var(--accent-primary)">[PUSH]</text>
      <text class="text-label" x="0" y="16" font-size="10px">deepvision-ai: v1.1 update</text>
      
      <!-- Event 2 -->
      <text class="text-mono" x="0" y="50" fill="var(--accent-secondary)">[RELEASE]</text>
      <text class="text-label" x="0" y="66" font-size="10px">smart-home: interface finalized</text>

      <!-- Event 3 -->
      <text class="text-mono" x="0" y="100" fill="var(--text-primary)">[MERGE]</text>
      <text class="text-label" x="0" y="116" font-size="10px">nlp-app: integrated BERT weights</text>
      
      <!-- Event 4 -->
      <text class="text-mono" x="0" y="150" fill="var(--accent-primary)">[EXPLORE]</text>
      <text class="text-label" x="0" y="166" font-size="10px">data-science: ipl scores telemetry</text>
    </g>
  </g>

  <!-- Footer Coordinates -->
  <text class="text-meta" x="120" y="390">LAST LEDGER SYNC: ACTIVE</text>
  <text class="text-meta" x="1080" y="390" text-anchor="end">EST: 2026</text>
</svg>
