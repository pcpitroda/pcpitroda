<svg width="1600" height="360" viewBox="0 0 1600 360" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bgPanel" x1="0" y1="0" x2="1600" y2="360" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#09090B"/>
<stop offset="50%" stop-color="#111827"/>
<stop offset="100%" stop-color="#09090B"/>
</linearGradient>

<radialGradient id="glowA"
cx="0"
cy="0"
r="1"
gradientUnits="userSpaceOnUse"
gradientTransform="translate(320 80) scale(420)">
<stop offset="0%" stop-color="#6366F1" stop-opacity="0.35"/>
<stop offset="55%" stop-color="#6366F1" stop-opacity="0.12"/>
<stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
</radialGradient>

<radialGradient id="glowB"
cx="0"
cy="0"
r="1"
gradientUnits="userSpaceOnUse"
gradientTransform="translate(1280 280) scale(520)">
<stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.28"/>
<stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.10"/>
<stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
</radialGradient>

<radialGradient id="centerGlow"
cx="0"
cy="0"
r="1"
gradientUnits="userSpaceOnUse"
gradientTransform="translate(800 180) scale(650)">
<stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
</radialGradient>

<pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
<circle cx="2" cy="2" r="1" fill="#FFFFFF" opacity="0.08"/>
</pattern>

<clipPath id="bClip">
<rect width="1600" height="360" rx="28"/>
</clipPath>

<style>

.eyebrow{
font-family:'Segoe UI',Arial,sans-serif;
font-size:14px;
font-weight:600;
letter-spacing:4px;
fill:#8B5CF6;
}

.quote{
font-family:'Segoe UI',Arial,sans-serif;
font-size:30px;
font-weight:700;
fill:#FFFFFF;
}

.quote2{
font-family:'Segoe UI',Arial,sans-serif;
font-size:24px;
font-weight:400;
fill:#A1A1AA;
}

.name{
font-family:'Segoe UI',Arial,sans-serif;
font-size:14px;
font-weight:600;
letter-spacing:2px;
fill:#D4D4D8;
}

</style>

</defs>

<g clip-path="url(#bClip)">

<rect width="1600" height="360" fill="url(#bgPanel)"/>

<rect width="1600" height="360" fill="url(#centerGlow)"/>

<rect width="1600" height="360" fill="url(#glowA)"/>

<rect width="1600" height="360" fill="url(#glowB)"/>

<rect width="1600" height="360" fill="url(#dots)"/>

<text
x="800"
y="125"
text-anchor="middle"
class="eyebrow">
DEVELOPER PHILOSOPHY
</text>

<text
x="800"
y="185"
text-anchor="middle"
class="quote">
Code that works is the beginning, not the finish line.
</text>

<text
x="800"
y="225"
text-anchor="middle"
class="quote2">
Clear enough to trust, intelligent enough to be worth trusting.
</text>

<rect
x="690"
y="255"
width="220"
height="44"
rx="22"
fill="#FFFFFF"
fill-opacity="0.05"
stroke="#FFFFFF"
stroke-opacity="0.10"/>

<text
x="800"
y="282"
text-anchor="middle"
class="name">
— PRIYANSHI PITRODA
</text>

</g>

</svg>
