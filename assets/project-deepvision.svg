<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --accent-secondary: #0F766E;
        --card-bg: rgba(18, 18, 18, 0.01);
        --border-color: #E6E4DF;
        --grid-line: rgba(18, 18, 18, 0.03);
        --viewport-bg: rgba(18, 18, 18, 0.02);
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --accent-secondary: #10B981;
          --card-bg: rgba(250, 249, 246, 0.02);
          --border-color: #222222;
          --grid-line: rgba(250, 249, 246, 0.02);
          --viewport-bg: rgba(250, 249, 246, 0.01);
        }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .card-rect { fill: var(--card-bg); stroke: var(--border-color); stroke-width: 1; transition: fill 0.4s ease, stroke 0.4s ease; }
      .viewport-rect { fill: var(--viewport-bg); stroke: var(--border-color); stroke-width: 0.75; }
      
      .text-title { font-family: var(--font-serif); font-size: 24px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-meta { font-family: var(--font-mono); font-size: 10px; fill: var(--accent-primary); letter-spacing: 0.15em; font-weight: 500; }
      .text-body { font-family: var(--font-sans); font-size: 13px; fill: var(--text-secondary); line-height: 1.5; transition: fill 0.4s ease; }
      
      .detect-box { fill: none; stroke: var(--accent-secondary); stroke-width: 1.5; }
      .detect-label { font-family: var(--font-mono); font-size: 9px; fill: var(--bg-color); }
      .detect-label-bg { fill: var(--accent-secondary); }
      .detect-polygon { fill: rgba(16, 185, 129, 0.08); stroke: var(--accent-secondary); stroke-dasharray: 2 2; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />
  <rect class="card-rect" x="10" y="10" width="580" height="300" rx="4" />

  <!-- Left: Editorial text details -->
  <g transform="translate(40, 50)">
    <text class="text-meta">PROJECT 01 / COMPUTER VISION</text>
    <text class="text-title" x="0" y="35">DeepVision AI</text>
    
    <text class="text-body" x="0" y="80">
      <tspan x="0" dy="0">Real-time object detection and semantic</tspan>
      <tspan x="0" dy="20">segmentation platform. Leverages deep</tspan>
      <tspan x="0" dy="20">convolutional networks to map spatial</tspan>
      <tspan x="0" dy="20">geometries and track entity vectors.</tspan>
    </text>

    <!-- Metrics info -->
    <g transform="translate(0, 180)">
      <line x1="0" y1="0" x2="220" y2="0" stroke="var(--border-color)" stroke-width="0.75" />
      <text class="text-meta" x="0" y="20">ACCURACY: 98.4%</text>
      <text class="text-meta" x="120" y="20">LATENCY: 14MS</text>
    </g>
  </g>

  <!-- Right: CV Visualizer Graphic (Viewport Simulation) -->
  <g transform="translate(320, 50)">
    <!-- Simulated Camera Viewport -->
    <rect class="viewport-rect" x="0" y="0" width="240" height="220" rx="2" />
    
    <!-- Viewport grid/crosshairs -->
    <line x1="120" y1="10" x2="120" y2="210" stroke="var(--grid-line)" stroke-width="0.5" stroke-dasharray="4 4" />
    <line x1="10" y1="110" x2="230" y2="110" stroke="var(--grid-line)" stroke-width="0.5" stroke-dasharray="4 4" />

    <!-- Corner bounding markers -->
    <path d="M 10 20 L 10 10 L 20 10" fill="none" stroke="var(--text-secondary)" stroke-width="1" />
    <path d="M 230 20 L 230 10 L 220 10" fill="none" stroke="var(--text-secondary)" stroke-width="1" />
    <path d="M 10 200 L 10 210 L 20 210" fill="none" stroke="var(--text-secondary)" stroke-width="1" />
    <path d="M 230 200 L 230 210 L 220 210" fill="none" stroke="var(--text-secondary)" stroke-width="1" />

    <!-- Detected entity: abstract human vector -->
    <!-- Head -->
    <circle cx="95" cy="80" r="14" fill="none" stroke="var(--text-primary)" stroke-width="1" />
    <!-- Spine and shoulders -->
    <path d="M 95 94 L 95 150 M 65 110 L 125 110" fill="none" stroke="var(--text-primary)" stroke-width="1" />
    <!-- Arms -->
    <path d="M 65 110 L 50 145 M 125 110 L 140 145" fill="none" stroke="var(--text-primary)" stroke-width="1" />
    
    <!-- Bounding Box around entity -->
    <rect class="detect-box" x="40" y="55" width="110" height="110" />
    <rect class="detect-label-bg" x="40" y="44" width="70" height="11" />
    <text class="detect-label" x="43" y="53">ENTITY: 0.98</text>

    <!-- Detected entity 2: abstract cup/object on a table -->
    <path class="detect-polygon" d="M 160 170 L 195 170 L 188 200 L 167 200 Z" />
    <rect class="detect-label-bg" x="160" y="160" width="50" height="11" fill="var(--accent-primary)" />
    <text class="detect-label" x="163" y="169" fill="var(--bg-color)">OBJ_A: 0.92</text>
  </g>
</svg>
