<svg width="1600" height="260" viewBox="0 0 1600 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fBg" x1="0" y1="0" x2="1600" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#0B0B10"/>
    </linearGradient>
    <linearGradient id="fThread" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <pattern id="fGrid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <clipPath id="fClip"><rect width="1600" height="260" rx="28"/></clipPath>
    <style>
      .wave { animation: drift 10s ease-in-out infinite; transform-origin: center; }
      @keyframes drift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-24px); } }
      .beat { animation: beat 2.4s ease-in-out infinite; }
      @keyframes beat { 0%, 100% { r: 3.5; opacity: 0.6; } 50% { r: 6; opacity: 1; } }
      .ftitle { font: 600 26px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #FFFFFF; }
      .fsub { font: 400 15px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #A1A1AA; }
      .fmark { font: 700 15px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #6366F1; letter-spacing: 3px; }
    </style>
  </defs>
  <g clip-path="url(#fClip)">
    <rect width="1600" height="260" fill="url(#fBg)"/>
    <rect width="1600" height="260" fill="url(#fGrid)"/>

    <g class="wave">
      <path d="M -100 210 C 200 160, 500 240, 800 190 S 1400 150, 1800 200" stroke="url(#fThread)" stroke-width="2" opacity="0.5" fill="none"/>
    </g>
    <path d="M -50 60 C 250 20, 550 90, 850 50 S 1450 10, 1750 60" stroke="url(#fThread)" stroke-width="1.4" opacity="0.35" fill="none"/>

    <circle class="beat" cx="800" cy="126" r="4" fill="#6366F1"/>

    <text x="800" y="110" text-anchor="middle" class="fmark">THANK YOU FOR STOPPING BY</text>
    <text x="800" y="152" text-anchor="middle" class="ftitle">Let's build something intelligent together.</text>
    <text x="800" y="182" text-anchor="middle" class="fsub">© 2026 Priyanshi Pitroda · Crafted line by line, model by model.</text>
  </g>
</svg>
