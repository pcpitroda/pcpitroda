<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="100%" height="100%">
  <defs>
    <!-- Dark/Light Theme Variables -->
    <style>
      :root {
        --bg-color: #FAF9F6; /* Warm Ivory */
        --text-primary: #121212; /* Matte Black */
        --text-secondary: #5A5A55; /* Muted Slate */
        --accent-primary: #C5A880; /* Soft Gold */
        --accent-secondary: #0F766E; /* Emerald */
        --border-color: #E6E4DF;
        --grid-color: rgba(18, 18, 18, 0.03);
        --glow: rgba(197, 168, 128, 0.2);
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D; /* Matte Black */
          --text-primary: #FAF9F6; /* Warm Ivory */
          --text-secondary: #8E8D8A; /* Muted Graphite */
          --accent-primary: #E0C097; /* Warm Gold */
          --accent-secondary: #10B981; /* Emerald */
          --border-color: #222222;
          --grid-color: rgba(250, 249, 246, 0.02);
          --glow: rgba(224, 192, 151, 0.15);
        }
      }

      /* Animations */
      @keyframes floatShape {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(1deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }
      @keyframes floatShapeReverse {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(8px) rotate(-1deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .text-title { font-family: var(--font-serif); font-size: 58px; font-weight: 400; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-subtitle { font-family: var(--font-sans); font-size: 16px; font-weight: 300; letter-spacing: 0.15em; fill: var(--text-secondary); transition: fill 0.4s ease; }
      .text-tagline { font-family: var(--font-serif); font-size: 24px; font-style: italic; font-weight: 300; fill: var(--text-primary); opacity: 0.85; transition: fill 0.4s ease; }
      .text-meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; fill: var(--accent-primary); font-weight: 500; text-transform: uppercase; transition: fill 0.4s ease; }
      .grid-lines { stroke: var(--grid-color); stroke-width: 1; transition: stroke 0.4s ease; }
      
      .shape-gold { fill: none; stroke: var(--accent-primary); stroke-width: 1.5; stroke-dasharray: 8 4; transition: stroke 0.4s ease; }
      .shape-emerald { fill: none; stroke: var(--accent-secondary); stroke-width: 1; transition: stroke 0.4s ease; }
      
      .float-container-1 { animation: floatShape 6s ease-in-out infinite; transform-origin: 900px 225px; }
      .float-container-2 { animation: floatShapeReverse 8s ease-in-out infinite; transform-origin: 900px 225px; }
      
      .border-line { stroke: var(--border-color); stroke-width: 1; transition: stroke 0.4s ease; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg-rect" width="100%" height="100%" />

  <!-- Elegant Grid Background -->
  <line class="grid-lines" x1="80" y1="0" x2="80" y2="450" />
  <line class="grid-lines" x1="1120" y1="0" x2="1120" y2="450" />
  <line class="grid-lines" x1="0" y1="60" x2="1200" y2="60" />
  <line class="grid-lines" x1="0" y1="390" x2="1200" y2="390" />

  <!-- Left Content (Editorial Typography) -->
  <g transform="translate(120, 140)">
    <!-- Metadata Label -->
    <text class="text-meta" x="0" y="0">PORTFOLIO INDEX • MCA 2026</text>
    
    <!-- Title -->
    <text class="text-title" x="0" y="75">Priyanshi Pitroda</text>
    
    <!-- Tagline / Focus -->
    <text class="text-tagline" x="0" y="125">Synthesizing mathematics, algorithms, and digital interfaces.</text>
    
    <!-- Subtitle description -->
    <text class="text-subtitle" x="0" y="180">EXPLORING MACHINE LEARNING • DATA SCIENCE • WEB ARCHITECTURES</text>
  </g>

  <!-- Right Content (Abstract Hand-Crafted Art) -->
  <!-- Overlapping minimal geometric orbits and lines -->
  <g class="float-container-1">
    <!-- Outer delicate dashed orbit -->
    <circle class="shape-gold" cx="920" cy="210" r="130" />
    <!-- Golden solid dot -->
    <circle cx="820" cy="120" r="4" fill="var(--accent-primary)" />
    <!-- Connecting delicate line -->
    <line x1="920" y1="210" x2="820" y2="120" stroke="var(--text-secondary)" stroke-width="0.5" opacity="0.3" />
  </g>
  
  <g class="float-container-2">
    <!-- Emerald circle with slight offset -->
    <circle class="shape-emerald" cx="900" cy="230" r="90" />
    <circle cx="990" cy="230" r="3" fill="var(--accent-secondary)" />
    
    <!-- Central visual core - gold solid circle with soft glow -->
    <circle cx="920" cy="210" r="35" fill="var(--bg-color)" stroke="var(--accent-primary)" stroke-width="1.5" style="filter: drop-shadow(0 0 15px var(--glow));" />
    <circle cx="920" cy="210" r="6" fill="var(--accent-secondary)" />
  </g>

  <!-- Editorial Coordinates & Framing -->
  <text class="text-meta" x="120" y="415">LOC: INDIA</text>
  <text class="text-meta" x="1000" y="415" text-anchor="end">SYS.STATUS: ACTIVE</text>
  
  <!-- Outer framing lines -->
  <line class="border-line" x1="120" y1="60" x2="120" y2="390" />
  <line class="border-line" x1="1080" y1="60" x2="1080" y2="390" />
</svg>
