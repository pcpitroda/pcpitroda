<svg width="560" height="560" viewBox="0 0 560 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="hBg" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0%" stop-color="#14141B"/>
      <stop offset="100%" stop-color="#09090B"/>
    </radialGradient>
    <linearGradient id="hLine" x1="0" y1="0" x2="560" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="hCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </radialGradient>
    <clipPath id="hClip"><rect width="560" height="560" rx="26"/></clipPath>
    <style>
      .spin { animation: spin 40s linear infinite; transform-origin: 280px 280px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinRev { animation: spinRev 55s linear infinite; transform-origin: 280px 280px; }
      @keyframes spinRev { to { transform: rotate(-360deg); } }
      .node { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      .core { animation: breathe 4s ease-in-out infinite; transform-origin: 280px 280px; }
      @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    </style>
  </defs>
  <g clip-path="url(#hClip)">
    <rect width="560" height="560" fill="url(#hBg)"/>

    <g class="spin" opacity="0.55">
      <circle cx="280" cy="280" r="190" stroke="url(#hLine)" stroke-width="1" fill="none" stroke-dasharray="2 10"/>
    </g>
    <g class="spinRev" opacity="0.4">
      <circle cx="280" cy="280" r="150" stroke="#6366F1" stroke-width="1" fill="none" stroke-dasharray="1 8"/>
    </g>
    <circle cx="280" cy="280" r="110" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1" fill="none"/>

    <!-- network edges -->
    <g stroke="url(#hLine)" stroke-width="1.1" opacity="0.5">
      <line x1="280" y1="280" x2="140" y2="150"/>
      <line x1="280" y1="280" x2="420" y2="150"/>
      <line x1="280" y1="280" x2="140" y2="410"/>
      <line x1="280" y1="280" x2="420" y2="410"/>
      <line x1="280" y1="280" x2="100" y2="280"/>
      <line x1="280" y1="280" x2="460" y2="280"/>
      <line x1="140" y1="150" x2="100" y2="280"/>
      <line x1="420" y1="150" x2="460" y2="280"/>
      <line x1="140" y1="410" x2="100" y2="280"/>
      <line x1="420" y1="410" x2="460" y2="280"/>
    </g>

    <circle class="core" cx="280" cy="280" r="30" fill="url(#hCore)"/>
    <circle class="node" cx="140" cy="150" r="7" fill="#3B82F6"/>
    <circle class="node" cx="420" cy="150" r="7" fill="#6366F1" style="animation-delay:0.4s"/>
    <circle class="node" cx="140" cy="410" r="7" fill="#8B5CF6" style="animation-delay:0.8s"/>
    <circle class="node" cx="420" cy="410" r="7" fill="#3B82F6" style="animation-delay:1.2s"/>
    <circle class="node" cx="100" cy="280" r="5.5" fill="#6366F1" style="animation-delay:1.6s"/>
    <circle class="node" cx="460" cy="280" r="5.5" fill="#8B5CF6" style="animation-delay:2s"/>
  </g>
</svg>
