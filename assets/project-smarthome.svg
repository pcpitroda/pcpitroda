<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #FAF9F6;
        --text-primary: #121212;
        --text-secondary: #5A5A55;
        --accent-primary: #C5A880;
        --accent-secondary: #0F766E;
        --card-bg: rgba(18, 18, 18, 0.01);
        --border-color: #E6E4DF;
        --dial-track: #E6E4DF;
        --font-serif: "Playfair Display", "Georgia", serif;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #0D0D0D;
          --text-primary: #FAF9F6;
          --text-secondary: #8E8D8A;
          --accent-primary: #E0C097;
          --accent-secondary: #10B981;
          --card-bg: rgba(250, 249, 246, 0.02);
          --border-color: #222222;
          --dial-track: #222222;
        }
      }

      .bg-rect { fill: var(--bg-color); transition: fill 0.4s ease; }
      .card-rect { fill: var(--card-bg); stroke: var(--border-color); stroke-width: 1; transition: fill 0.4s ease, stroke 0.4s ease; }
      
      .text-title { font-family: var(--font-serif); font-size: 24px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .text-meta { font-family: var(--font-mono); font-size: 10px; fill: var(--accent-primary); letter-spacing: 0.15em; font-weight: 500; }
      .text-body { font-family: var(--font-sans); font-size: 13px; fill: var(--text-secondary); line-height: 1.5; transition: fill 0.4s ease; }
      
      .dial-outer { fill: none; stroke: var(--dial-track); stroke-width: 6; }
      .dial-active { fill: none; stroke: var(--accent-primary); stroke-width: 6; stroke-dasharray: 280 400; stroke-linecap: round; }
      .node-dot { fill: var(--accent-secondary); }
      .node-text { font-family: var(--font-mono); font-size: 10px; fill: var(--text-primary); transition: fill 0.4s ease; }
      .grid-lines { stroke: var(--border-color); stroke-width: 0.75; }
    </style>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />
  <rect class="card-rect" x="10" y="10" width="580" height="300" rx="4" />

  <!-- Left: Editorial details -->
  <g transform="translate(40, 50)">
    <text class="text-meta">PROJECT 02 / DOMESTIC INTERFACES</text>
    <text class="text-title" x="0" y="35">Smart Home Hub</text>
    
    <text class="text-body" x="0" y="80">
      <tspan x="0" dy="0">An environmental control board mapping</tspan>
      <tspan x="0" dy="20">IoT nodes and optimizing climate dynamics</tspan>
      <tspan x="0" dy="20">using telemetry feeds and an elegant,</tspan>
      <tspan x="0" dy="20">minimal user interface.</tspan>
    </text>

    <!-- Room status list -->
    <g transform="translate(0, 175)">
      <circle cx="5" cy="5" r="4" class="node-dot" />
      <text class="node-text" x="20" y="8">LIVING ROOM: ACTIVE</text>
      
      <circle cx="5" cy="25" r="4" class="node-dot" />
      <text class="node-text" x="20" y="28">KITCHEN: SECURE</text>

      <circle cx="5" cy="45" r="4" class="node-dot" fill="var(--accent-primary)" />
      <text class="node-text" x="20" y="48">CLIMATE TARGET: 21°C</text>
    </g>
  </g>

  <!-- Right: Thermostat Dial Graphic -->
  <g transform="translate(420, 150)">
    <!-- Thermostat background dial circle -->
    <circle class="dial-outer" cx="0" cy="0" r="70" />
    <!-- Active temp arc -->
    <circle class="dial-active" cx="0" cy="0" r="70" transform="rotate(-90)" />

    <!-- Center Temperature Value -->
    <text x="0" y="-5" font-family="var(--font-serif)" font-size="36px" font-weight="300" fill="var(--text-primary)" text-anchor="middle" transition="fill 0.4s ease">21</text>
    <text x="22" y="-18" font-family="var(--font-sans)" font-size="14px" fill="var(--accent-primary)" text-anchor="middle">°C</text>
    <text x="0" y="20" font-family="var(--font-mono)" font-size="9px" fill="var(--text-secondary)" letter-spacing="0.1em" text-anchor="middle" transition="fill 0.4s ease">CLIMATE NODE</text>
    
    <!-- Outer accent coordinate lines -->
    <line class="grid-lines" x1="-95" y1="0" x2="-80" y2="0" />
    <line class="grid-lines" x1="80" y1="0" x2="95" y2="0" />
    <line class="grid-lines" x1="0" y1="-95" x2="0" y2="-80" />
    <line class="grid-lines" x1="0" y1="80" x2="0" y2="95" />
    
    <circle cx="60" cy="-35" r="3" fill="var(--accent-secondary)" />
  </g>
</svg>
