      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" fill="url(#bg2)"/>

  <!-- template for 6 cards, 3 cols x 2 rows -->
  <!-- card generator values -->
  <!-- Row 1 -->
  <g>
    <rect x="40"  y="30" width="360" height="240" rx="18" fill="#F8FAFC" fill-opacity="0.035" stroke="#F8FAFC" stroke-opacity="0.09"/>
    <rect x="40" y="30" width="4" height="240" rx="2" fill="url(#acc)"/>
    <text x="70" y="72" font-size="20" font-weight="700" fill="#F8FAFC">Frontend</text>
    <text x="70" y="106" font-size="15" fill="#94A3B8">React</text>
    <text x="70" y="132" font-size="15" fill="#94A3B8">Next.js</text>
    <text x="70" y="158" font-size="15" fill="#94A3B8">TypeScript</text>
    <text x="70" y="184" font-size="15" fill="#94A3B8">Tailwind CSS</text>
    <text x="70" y="210" font-size="15" fill="#94A3B8">Framer Motion</text>
  </g>

