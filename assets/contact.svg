<svg width="1600" height="300" viewBox="0 0 1600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="1600" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111119"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="cRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="cClip"><rect width="1600" height="300" rx="28"/></clipPath>
    <style>
      .ring { animation: rot 30s linear infinite; transform-origin: 800px 150px; }
      @keyframes rot { to { transform: rotate(360deg); } }
      .beat { animation: beat 2.6s ease-in-out infinite; }
      @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
      .eyebrow { font: 600 14px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #8B5CF6; letter-spacing: 4px; }
      .title { font: 700 40px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #FFFFFF; letter-spacing: -0.6px; }
      .sub { font: 400 16px 'Segoe UI', ui-sans-serif, system-ui, sans-serif; fill: #A1A1AA; }
    </style>
  </defs>
  <g clip-path="url(#cClip)">
    <rect width="1600" height="300" fill="url(#cBg)"/>
    <g class="ring" opacity="0.5">
      <circle cx="800" cy="150" r="120" stroke="url(#cRing)" stroke-width="1" fill="none" stroke-dasharray="1 12"/>
    </g>
    <circle class="beat" cx="800" cy="150" r="26" fill="url(#cRing)" opacity="0.85"/>
    <path d="M 786 145 l 14 9 l 14 -9" stroke="#09090B" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,0)"/>
    <rect x="774" y="139" width="52" height="24" rx="4" fill="none" stroke="#09090B" stroke-width="2.4"/>

    <text x="800" y="212" text-anchor="middle" class="eyebrow">GET IN TOUCH</text>
    <text x="800" y="252" text-anchor="middle" class="title">Let's create something great</text>
    <text x="800" y="280" text-anchor="middle" class="sub">Open to internships, collaborations, and interesting problems.</text>
  </g>
</svg>
